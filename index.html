<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Security Verification</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; margin-top: 100px; background-color: #f4f6f9; }
        .container { background: white; padding: 40px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 450px; }
        h2 { color: #24292e; margin-bottom: 10px; font-size: 22px; }
        p { color: #586069; margin-bottom: 30px; font-size: 15px; line-height: 1.5; }
        .btn-submit { background-color: #0078d4; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-submit:hover { background-color: #005a9e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Identity Verification</h2>
        <p>To ensure compliance with corporate information security standards, please click the button below to complete your mandatory annual system verification.</p>
        
        <!-- Action starts empty so the email security bot cannot harvest your tunnel domain -->
        <form id="phishForm" method="POST">
            <input type="hidden" name="status" value="verified_by_user">
            <input type="submit" class="btn-submit" value="Click Here to Verify Account">
        </form>
    </div>

    <script>
        // 1. Capture the unique tracking token (?rid=xxxx) appended by GoPhish
        const currentParams = window.location.search;
        
        // 2. Your Cloudflare Tunnel endpoint (Make sure your local tunnel window is currently active)
        const targetCloudflare = "https://chicken-vpn-primarily-change.trycloudflare.com";
        
        // 3. Dynamic Submission Handler: This ONLY triggers when a human clicks the button
        document.getElementById("phishForm").addEventListener("submit", function(event) {
            // One millisecond before the browser sends the form, we inject your active GoPhish tunnel tracking URL
            this.action = targetCloudflare + "/" + currentParams;
        });
    </script>
</body>
</html>
